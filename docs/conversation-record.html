<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Task Manager - 完整对话流程</title>
<style>
  :root {
    --bg: #0a0c12;
    --surface: #12141e;
    --surface2: #1a1d2b;
    --surface3: #232738;
    --border: #2a2e42;
    --text: #e2e4f0;
    --text2: #8890a8;
    --accent: #6366f1;
    --accent2: #818cf8;
    --user-msg: #1e293b;
    --user-border: #334155;
    --ai-msg: #1a1f3a;
    --ai-border: #2e3a6e;
    --phase-1: #f59e0b;
    --phase-2: #6366f1;
    --phase-3: #22c55e;
    --phase-4: #ef4444;
    --phase-5: #8b5cf6;
    --phase-6: #06b6d4;
    --high: #ef4444;
    --medium: #f59e0b;
    --low: #6b7280;
    --done: #22c55e;
    --code-bg: #0d0f17;
    --commit: #f472b6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem; overflow-y: auto;
    position: sticky; top: 0; height: 100vh;
  }
  .sidebar h1 {
    font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem;
    color: var(--accent2);
  }
  .sidebar .subtitle {
    font-size: 0.7rem; color: var(--text2); margin-bottom: 1.5rem;
  }
  .sidebar .progress-stats {
    font-size: 0.7rem; color: var(--text2); margin-bottom: 1.5rem;
    background: var(--surface2); padding: 0.75rem; border-radius: 8px;
    line-height: 1.6;
  }
  .sidebar .progress-stats span { color: var(--accent2); font-weight: 600; }
  .sidebar nav a {
    display: block; padding: 0.4rem 0.6rem;
    font-size: 0.78rem; color: var(--text2); text-decoration: none;
    border-radius: 6px; margin-bottom: 2px;
    transition: all 0.15s; border-left: 2px solid transparent;
  }
  .sidebar nav a:hover { color: var(--text); background: var(--surface2); }
  .sidebar nav a.phase1 { border-left-color: var(--phase-1); }
  .sidebar nav a.phase2 { border-left-color: var(--phase-2); }
  .sidebar nav a.phase3 { border-left-color: var(--phase-3); }
  .sidebar nav a.phase4 { border-left-color: var(--phase-4); }
  .sidebar nav a.phase5 { border-left-color: var(--phase-5); }
  .sidebar nav a.phase6 { border-left-color: var(--phase-6); }
  .sidebar .phase-label {
    font-size: 0.65rem; color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.5px; margin: 0.8rem 0 0.3rem 0; font-weight: 600;
  }

  /* Main */
  .main { flex: 1; max-width: 900px; margin: 0 auto; padding: 2rem; }

  /* Phase Header */
  .phase-header {
    text-align: center; padding: 2rem 1rem; margin: 2rem 0;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    position: relative;
  }
  .phase-header .badge {
    display: inline-block; padding: 0.2rem 0.8rem; border-radius: 999px;
    font-size: 0.7rem; font-weight: 600; margin-bottom: 0.5rem;
  }
  .phase-header h2 { font-size: 1.3rem; font-weight: 700; }
  .phase-header p { font-size: 0.8rem; color: var(--text2); margin-top: 0.3rem; }
  .phase-header .line {
    position: absolute; left: 50%; top: -1px; width: 60px; height: 3px;
    border-radius: 3px; transform: translateX(-50%);
  }

  /* Round */
  .round { margin-bottom: 1.5rem; position: relative; }
  .round-number {
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;
  }
  .round-number .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .round-number .label {
    font-size: 0.75rem; color: var(--text2); font-weight: 500;
  }
  .round-number .line {
    flex: 1; height: 1px; background: var(--border);
  }

  /* Messages */
  .msg { margin-bottom: 0.75rem; display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.ai { justify-content: flex-start; }
  .msg.system { justify-content: center; }
  .msg .bubble {
    max-width: 80%; padding: 0.75rem 1rem; border-radius: 12px;
    font-size: 0.88rem; line-height: 1.6; position: relative;
  }
  .msg.user .bubble {
    background: var(--user-msg); border: 1px solid var(--user-border);
    border-bottom-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-msg); border: 1px solid var(--ai-border);
    border-bottom-left-radius: 4px;
  }
  .msg.system .bubble {
    background: transparent; text-align: center;
    font-size: 0.75rem; color: var(--text2); max-width: 100%;
    padding: 0.5rem; border: none;
  }
  .msg .label {
    font-size: 0.65rem; color: var(--text2); margin-bottom: 0.3rem;
    font-weight: 600;
  }
  .msg.user .label { text-align: right; }
  .msg.ai .label { text-align: left; }

  /* Content within messages */
  .bubble p { margin-bottom: 0.5rem; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { margin: 0.3rem 0 0.3rem 1.2rem; }
  .bubble li { margin-bottom: 0.2rem; }
  .bubble strong { color: var(--accent2); }
  .bubble code {
    background: var(--code-bg); padding: 0.1rem 0.4rem; border-radius: 4px;
    font-size: 0.82rem; color: var(--accent);
  }
  .bubble .code-block {
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.8rem; margin: 0.5rem 0; overflow-x: auto;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.78rem; line-height: 1.5; white-space: pre;
    color: var(--text2);
  }
  .bubble .commit-line {
    color: var(--commit); font-family: monospace; font-size: 0.78rem;
    padding: 0.4rem 0; border-left: 2px solid var(--commit);
    padding-left: 0.6rem; margin: 0.3rem 0;
  }
  .bubble .table-wrap { overflow-x: auto; margin: 0.5rem 0; }
  .bubble table {
    width: 100%; border-collapse: collapse; font-size: 0.8rem;
  }
  .bubble th, .bubble td {
    padding: 0.4rem 0.6rem; border: 1px solid var(--border); text-align: left;
  }
  .bubble th { background: var(--surface2); font-weight: 600; }

  /* Issue badges */
  .issue { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px;
    font-size: 0.7rem; font-weight: 600; margin-right: 0.3rem; }
  .issue-high { background: rgba(239,68,68,0.15); color: var(--high); }
  .issue-medium { background: rgba(245,158,11,0.15); color: var(--medium); }
  .issue-low { background: rgba(107,114,128,0.15); color: var(--low); }

  /* Stats card */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.75rem; margin: 1.5rem 0;
  }
  .stat-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem; text-align: center;
  }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--accent2); }
  .stat-card .label { font-size: 0.7rem; color: var(--text2); margin-top: 0.2rem; }

  /* Choice badge */
  .choice {
    display: inline-block; padding: 0.2rem 0.8rem; border-radius: 999px;
    font-size: 0.75rem; font-weight: 600;
  }
  .choice-a { background: rgba(99,102,241,0.15); color: var(--accent2); }
  .choice-b { background: rgba(34,197,94,0.15); color: var(--done); }
  .choice-c { background: rgba(245,158,11,0.15); color: var(--medium); }

  /* Highlight box */
  .highlight {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); border-radius: 8px;
    padding: 0.8rem; margin: 0.5rem 0; font-size: 0.82rem;
  }
  .highlight.good { border-left-color: var(--done); }
  .highlight.bad { border-left-color: var(--high); }

  /* Divider */
  .divider { text-align: center; padding: 0.5rem 0; color: var(--border); font-size: 0.8rem; }

  /* Scroll to top */
  .scroll-top {
    position: fixed; bottom: 2rem; right: 2rem;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface3); border: 1px solid var(--border);
    color: var(--text2); font-size: 1.2rem; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .scroll-top:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .scroll-top.visible { display: flex; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 1rem; max-width: 100%; }
    .msg .bubble { max-width: 90%; }
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

function render() {
  const app = document.getElementById('app');
  const nav = document.getElementById('sidebar-nav');
  let html = '';

  // Title
  html += `<div style="text-align:center;padding:2rem 0 1rem"><h1 style="font-size:1.8rem;font-weight:800;color:var(--accent2)">💬 AI Task Manager</h1><p style="color:var(--text2);font-size:0.9rem;margin-top:0.3rem">从零构建项目的完整对话记录 · 2026-05-23</p></div>`;

  // Stats
  html += `<div class="stats-grid">`;
  data.stats.forEach(s => {
    html += `<div class="stat-card"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`;
  });
  html += `</div>`;

  // Phases
  let navHtml = '';
  data.phases.forEach((phase, pi) => {
    const colors = ['var(--phase-1)','var(--phase-2)','var(--phase-3)','var(--phase-4)','var(--phase-5)','var(--phase-6)'];
    const phaseNum = pi + 1;

    // Sidebar nav
    navHtml += `<div class="phase-label">阶段 ${phaseNum}</div>`;
    phase.rounds.forEach(r => {
      navHtml += `<a href="#round-${r.num}" class="${phase.id}" onclick="document.getElementById('round-${r.num}').scrollIntoView({behavior:'smooth'});return false">第${r.num}轮 ${r.title}</a>`;
    });

    // Phase header
    html += `<div class="phase-header" id="${phase.id}">`;
    html += `<div class="line" style="background:${colors[pi]}"></div>`;
    html += `<div class="badge" style="background:${colors[pi]}22;color:${colors[pi]}">阶段 ${phaseNum}</div>`;
    html += `<h2>${phase.label}</h2>`;
    html += `<p>共 ${phase.rounds.length} 轮对话</p></div>`;

    // Rounds
    phase.rounds.forEach(r => {
      html += `<div class="round" id="round-${r.num}">`;
      html += `<div class="round-number"><div class="dot" style="background:${colors[pi]}"></div><span class="label">第 ${r.num} 轮：${r.title}</span><div class="line"></div></div>`;
      r.messages.forEach(m => {
        if (m.who === 'system') {
          html += `<div class="msg system"><div class="bubble">${m.text}</div></div>`;
        } else if (m.who === 'user') {
          html += `<div class="msg user"><div class="bubble"><div class="label">👤 用户</div>${m.text}</div></div>`;
        } else {
          html += `<div class="msg ai"><div class="bubble"><div class="label">🤖 AI</div>${m.text}</div></div>`;
        }
      });
      html += `<div class="divider">· · ·</div>`;
      html += `</div>`;
    });
  });

  // Appendix
  html += `<div class="phase-header"><div class="line" style="background:var(--text2)"></div><h2>📊 项目总结</h2></div>`;
  html += `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin:1rem 0">`;
  html += `<div class="stats-grid">`;
  data.stats.forEach(s => {
    html += `<div class="stat-card"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`;
  });
  html += `</div>`;

  // Architecture flow
  html += `<h3 style="margin-top:1.5rem;margin-bottom:0.75rem;font-size:1rem">架构数据流</h3>`;
  html += `<div class="code-block" style="text-align:center;line-height:2">用户对话 / CLI 命令<br>↓<br>commands/ (Click CLI)<br>↓<br>storage/ (JsonStore → JSON 文件)<br>↑ ↓<br>models/ (Project / Task dataclass)<br>↓<br>templates/ (Jinja2 → HTML 看板)</div>`;

  html += `<h3 style="margin-top:1.5rem;margin-bottom:0.75rem;font-size:1rem">Git 提交历史</h3>`;
  html += `<div class="code-block" style="font-size:0.75rem">80b8b9d chore: scaffold project structure and dependencies<br>7841408 feat: add Project and Task data models<br>956cae8 refactor: fix immutable patterns and improve test coverage<br>97632da feat: implement JSON file storage layer<br>961a987 feat: add project CRUD commands<br>2e8a804 feat: add task CRUD commands<br>d74d2c5 feat: add agent assignment commands<br>f60f6f8 feat: add kanban HTML template with dark theme<br>6278324 feat: add HTML report generation command<br>f00ba22 feat: add main CLI entry point<br>bc5b5a0 feat: add project directory initialization<br>0abcb93 fix: add Windows GBK terminal emoji compatibility<br>96e272d fix: resolve code review issues<br>8c98122 chore: add .gitignore, README, and design docs<br>ac3b6a5 docs: add AI-assisted development workflow guide<br>0e08476 docs: add full conversation record</div>`;
  html += `</div>`;

  app.innerHTML = html;
  nav.innerHTML = navHtml;
}

render();
